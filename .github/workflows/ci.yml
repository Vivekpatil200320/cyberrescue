name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync workspace (core + backend)
        run: uv sync --all-packages

      - name: Lint
        run: uv run ruff check src/ tests/ backend/ infra/

      - name: Test core package (MCP tools, security, demo policy)
        run: uv run pytest tests/ -v

      - name: Test backend (FastAPI routes, rate limiting)
        run: uv run --project backend pytest backend/tests/ -v

  frontend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Type-check
        working-directory: web
        run: npx tsc --noEmit

      - name: Lint
        working-directory: web
        run: npm run lint

  deploy:
    name: Deploy backend to VPS
    needs: [lint-and-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/cyberrescue
            git pull
            uv sync --all-packages
            sudo systemctl restart cyberrescue-backend
            cd infra && docker compose up -d --build
